# Overlay for selecting CoAP over HTTP for connecting to Memfault.
# This sample configuration is *EXPERIMENTAL* and may be updated in a future
# SDK release.

# Enable CoAP, disable HTTP
CONFIG_MEMFAULT_USE_NRF_CLOUD_COAP=y
CONFIG_MEMFAULT_HTTP_ENABLE=n
# Disable FOTA in CoAP mode. This sample may be updated in the future to support
# FOTA over CoAP.
CONFIG_MEMFAULT_FOTA=n

# nRF Cloud CoAP (required for Memfault CoAP uploads)
CONFIG_NRF_CLOUD=y
CONFIG_NRF_CLOUD_COAP=y
# Use the modem's internal UUID as the nRF Cloud client ID (for JWT auth)
CONFIG_NRF_CLOUD_CLIENT_ID_SRC_INTERNAL_UUID=y
CONFIG_MODEM_JWT=y

# CoAP client (needs more stack and heap than HTTP)
CONFIG_COAP_CLIENT_BLOCK_SIZE=1024
CONFIG_COAP_CLIENT_STACK_SIZE=6144
CONFIG_COAP_CLIENT_THREAD_PRIORITY=0
CONFIG_AT_MONITOR_HEAP_SIZE=512

CONFIG_COAP_EXTENDED_OPTIONS_LEN_VALUE=192
CONFIG_NRF_CLOUD_COAP_MAX_USER_OPTIONS=2
CONFIG_COAP_CLIENT_MAX_EXTRA_OPTIONS=3
