CONFIG_ZTEST=y
CONFIG_MEMFAULT=y

# Basic Networking Support
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_TEST=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y

# Network Testing
CONFIG_TEST_RANDOM_GENERATOR=y

# Network Configuration
# CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
# CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"

# Memory Configuration
CONFIG_HEAP_MEM_POOL_SIZE=30000

# Memfault Configuration
CONFIG_MEMFAULT_HTTP_ENABLE=y
CONFIG_MEMFAULT_PROJECT_KEY="dummy"
# Disable for testing purposes (mocks are used instead of TLS_CREDENTIAL_STORAGE
# backend)
CONFIG_MEMFAULT_ROOT_CERT_STORAGE=n

# MbedTLS Configuration
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_SHA1=y
CONFIG_MBEDTLS_SERVER_NAME_INDICATION=y
